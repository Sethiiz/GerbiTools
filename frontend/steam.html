<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Platinum Viewer | GerbiTools</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid #2a2a3a; display: flex; align-items: center; gap: 1rem; }
    header a { color: #888; text-decoration: none; font-size: 0.9rem; }
    header h1 { font-size: 1.3rem; color: #fff; }
    main { padding: 2rem; max-width: 960px; }

    .search-row { display: flex; gap: 0.8rem; }
    .search-row input { flex: 1; padding: 0.65rem 1rem; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 6px; color: #e0e0e0; font-size: 0.95rem; }
    .search-row input:focus { outline: none; border-color: #5865f2; }
    .btn { padding: 0.65rem 1.4rem; background: #5865f2; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; white-space: nowrap; }
    .btn:disabled { background: #3a3a5a; cursor: not-allowed; }

    #status { margin-top: 1.2rem; color: #888; font-size: 0.9rem; }

    .summary { background: #1a1a2e; border-radius: 8px; padding: 1rem 1.5rem; margin: 1.5rem 0; display: flex; gap: 2rem; flex-wrap: wrap; }
    .summary div { font-size: 0.9rem; color: #888; }
    .summary span { color: #fff; font-weight: bold; }

    /* toolbar */
    .toolbar { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.45rem 1rem; background: #1a1a2e; color: #ccc; border: 1px solid #2a2a3a; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; transition: all 0.15s; }
    .filter-btn:hover { border-color: #5865f2; color: #fff; }
    .filter-btn.active { border-color: #5865f2; background: #1e2040; color: #7c8af7; }
    .filter-badge { background: #5865f2; color: #fff; font-size: 0.7rem; font-weight: 700; border-radius: 99px; padding: 0.05rem 0.45rem; line-height: 1.5; }
    .active-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .tag-chip { background: #1e2040; border: 1px solid #5865f2; border-radius: 99px; padding: 0.2rem 0.7rem; font-size: 0.75rem; color: #7c8af7; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 0.3rem; }
    .tag-chip:hover { background: #2a2a5a; }
    .export-btn { margin-left: auto; padding: 0.45rem 1rem; background: #1a1a2e; color: #888; border: 1px solid #2a2a3a; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .export-btn:hover { border-color: #5865f2; color: #fff; }

    /* painel de filtros */
    .filter-panel { background: #13131f; border: 1px solid #2a2a3a; border-radius: 10px; padding: 0; margin-bottom: 1rem; overflow: hidden; max-height: 0; transition: max-height 0.25s ease, padding 0.25s ease; }
    .filter-panel.open { max-height: 600px; }
    .filter-panel-inner { padding: 1.4rem 1.6rem; }

    .filter-section { margin-bottom: 1.2rem; }
    .filter-section:last-child { margin-bottom: 0; }
    .filter-section-title { font-size: 0.7rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.7rem; }

    /* status como pills */
    .status-pills { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .status-pill { padding: 0.35rem 0.9rem; border-radius: 99px; border: 1px solid #2a2a3a; font-size: 0.82rem; cursor: pointer; background: transparent; color: #666; transition: all 0.15s; user-select: none; }
    .status-pill:hover { border-color: #444; color: #aaa; }
    .status-pill.sel-platinado  { background: rgba(76,175,80,0.15);  border-color: #4caf50; color: #4caf50; }
    .status-pill.sel-incompleto { background: rgba(255,193,7,0.12);  border-color: #ffc107; color: #ffc107; }
    .status-pill.sel-nunca      { background: rgba(136,136,136,0.1); border-color: #666;    color: #aaa; }

    /* divider */
    .filter-divider { border: none; border-top: 1px solid #1e1e2e; margin: 1.1rem 0; }

    /* ranges e nome */
    .filter-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .filter-field label { display: block; font-size: 0.7rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
    .range-inputs { display: flex; gap: 0.5rem; align-items: center; }
    .range-inputs input { flex: 1; padding: 0.5rem 0.7rem; background: #0f1117; border: 1px solid #252535; border-radius: 6px; color: #ccc; font-size: 0.85rem; transition: border-color 0.15s; }
    .range-inputs input:focus { outline: none; border-color: #5865f2; color: #fff; }
    .range-inputs span { color: #333; font-size: 0.9rem; flex-shrink: 0; }
    .name-input { width: 100%; padding: 0.5rem 0.7rem; background: #0f1117; border: 1px solid #252535; border-radius: 6px; color: #ccc; font-size: 0.85rem; transition: border-color 0.15s; }
    .name-input:focus { outline: none; border-color: #5865f2; color: #fff; }

    /* ações */
    .filter-actions { display: flex; justify-content: flex-end; gap: 0.6rem; padding-top: 1rem; border-top: 1px solid #1e1e2e; margin-top: 1rem; }
    .btn-apply { padding: 0.45rem 1.2rem; background: #5865f2; color: #fff; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 600; transition: background 0.15s; }
    .btn-apply:hover { background: #6b77f5; }
    .btn-clear { padding: 0.45rem 1.2rem; background: transparent; color: #666; border: 1px solid #2a2a3a; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
    .btn-clear:hover { border-color: #555; color: #aaa; }

    /* tabela */
    .table-info { font-size: 0.8rem; color: #555; margin-bottom: 0.5rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    th { background: #1a1a2e; padding: 0.6rem 0.8rem; text-align: left; color: #aaa; font-weight: 600; white-space: nowrap; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: #fff; }
    th.sort-asc::after  { content: " ↑"; color: #5865f2; }
    th.sort-desc::after { content: " ↓"; color: #5865f2; }
    th.sort-asc, th.sort-desc { color: #fff; }
    td { padding: 0.55rem 0.8rem; border-top: 1px solid #1a1a2e; }
    td a { color: #5865f2; text-decoration: none; }
    td a:hover { text-decoration: underline; }
    .platinado    { color: #4caf50; }
    .incompleto   { color: #ffc107; }
    .nunca-jogado { color: #888; }
  </style>
</head>
<body>
  <header>
    <a href="/">← GerbiTools</a>
    <h1>Steam Platinum Viewer</h1>
  </header>
  <main>
    <div class="search-row">
      <input type="text" id="profileInput" placeholder="SteamID64 ou URL do perfil (ex: steamcommunity.com/id/seu-nome)">
      <button class="btn" id="searchBtn" onclick="doSearch()">Buscar</button>
    </div>
    <div id="status"></div>
    <div id="results"></div>
  </main>

  <script>
    const profileInput = document.getElementById("profileInput");
    const searchBtn    = document.getElementById("searchBtn");
    const status       = document.getElementById("status");
    const results      = document.getElementById("results");

    profileInput.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(); });

    let allGames = [];
    let activeFilters = {};
    let currentSort = { key: "hours", dir: "asc" };
    let lastFiltered = [];

    async function doSearch() {
      const profile = profileInput.value.trim();
      if (!profile) return;

      searchBtn.disabled = true;
      status.textContent = "Buscando jogos... isso pode levar alguns minutos.";
      results.innerHTML  = "";
      allGames           = [];
      activeFilters      = {};

      try {
        const res  = await fetch(`/steam/platinum?profile=${encodeURIComponent(profile)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Erro desconhecido");
        allGames = data.games;
        renderAll(data);
        status.textContent = "";
      } catch (e) {
        status.textContent = "Erro: " + e.message;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function statusClass(s) {
      if (s === "Platinado")  return "platinado";
      if (s === "Incompleto") return "incompleto";
      return "nunca-jogado";
    }

    function renderAll(data) {
      results.innerHTML = `
        <div class="summary">
          <div>Total: <span>${data.total}</span></div>
          <div>Platinados: <span class="platinado">${data.platinados}</span></div>
          <div>Incompletos: <span class="incompleto">${data.incompletos}</span></div>
          <div>Nunca jogados: <span class="nunca-jogado">${data.nunca_jogados}</span></div>
        </div>

        <div class="toolbar">
          <button class="filter-btn" id="filterToggle" onclick="togglePanel()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2h13l-5 6v5l-3-1.5V8L1.5 2z"/></svg>
            Filtros
          </button>
          <div class="active-tags" id="activeTags"></div>
          <button class="export-btn" onclick="exportXlsx()">Exportar Excel</button>
        </div>

        <div class="filter-panel" id="filterPanel">
          <div class="filter-panel-inner">
            <div class="filter-section">
              <div class="filter-section-title">Status</div>
              <div class="status-pills">
                <span class="status-pill" data-value="Platinado"    onclick="togglePill(this)">Platinado</span>
                <span class="status-pill" data-value="Incompleto"   onclick="togglePill(this)">Incompleto</span>
                <span class="status-pill" data-value="Nunca jogado" onclick="togglePill(this)">Nunca jogado</span>
              </div>
            </div>
            <hr class="filter-divider">
            <div class="filter-row">
              <div class="filter-field">
                <label>Horas HLTB</label>
                <div class="range-inputs">
                  <input type="number" id="fHoursMin" min="0" placeholder="Min">
                  <span>—</span>
                  <input type="number" id="fHoursMax" min="0" placeholder="Max">
                </div>
              </div>
              <div class="filter-field">
                <label>Conquistas</label>
                <div class="range-inputs">
                  <input type="number" id="fAchMin" min="0" placeholder="Min">
                  <span>—</span>
                  <input type="number" id="fAchMax" min="0" placeholder="Max">
                </div>
              </div>
            </div>
            <hr class="filter-divider">
            <div class="filter-field">
              <label>Nome do jogo</label>
              <input type="text" class="name-input" id="fName" placeholder="Buscar por nome...">
            </div>
            <div class="filter-actions">
              <button class="btn-clear" onclick="clearFilters()">Limpar</button>
              <button class="btn-apply" onclick="applyFilters()">Aplicar</button>
            </div>
          </div>
        </div>

        <div class="table-info" id="tableInfo"></div>
        <table>
          <thead>
            <tr>
              <th class="sortable" data-sort="index"        onclick="sortBy('index')">#</th>
              <th class="sortable" data-sort="name"         onclick="sortBy('name')">Jogo</th>
              <th>Status</th>
              <th class="sortable" data-sort="achievements" onclick="sortBy('achievements')">Conquistas</th>
              <th class="sortable" data-sort="hours"        onclick="sortBy('hours')">Horas (HLTB)</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>`;

      renderRows(allGames);
    }

    function sortGames(games) {
      const { key, dir } = currentSort;
      const mult = dir === "asc" ? 1 : -1;
      return [...games].sort((a, b) => {
        if (key === "name")  return mult * a.name.localeCompare(b.name);
        if (key === "index") return 0; // mantém ordem original
        return mult * (a[key] - b[key]);
      });
    }

    function renderRows(games) {
      const tbody = document.getElementById("tableBody");
      const info  = document.getElementById("tableInfo");
      if (!tbody) return;

      lastFiltered = games;
      const sorted = sortGames(games);

      info.textContent = games.length < allGames.length
        ? `Mostrando ${games.length} de ${allGames.length} jogos`
        : "";

      tbody.innerHTML = sorted.map((g, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${g.name}</td>
          <td class="${statusClass(g.status)}">${g.status}</td>
          <td>${g.achievements}</td>
          <td>${g.hours}h</td>
          <td><a href="${g.link_hltb}" target="_blank">HLTB</a></td>
        </tr>`).join("");

      updateSortHeaders();
    }

    function sortBy(key) {
      if (currentSort.key === key) {
        currentSort.dir = currentSort.dir === "asc" ? "desc" : "asc";
      } else {
        currentSort = { key, dir: key === "name" ? "asc" : "asc" };
      }
      renderRows(lastFiltered.length ? lastFiltered : allGames);
    }

    function updateSortHeaders() {
      document.querySelectorAll("th.sortable").forEach(th => {
        th.classList.remove("sort-asc", "sort-desc");
        if (th.dataset.sort === currentSort.key)
          th.classList.add(currentSort.dir === "asc" ? "sort-asc" : "sort-desc");
      });
    }

    function togglePanel() {
      const panel  = document.getElementById("filterPanel");
      const btn    = document.getElementById("filterToggle");
      const isOpen = panel.classList.toggle("open");
      btn.classList.toggle("active", isOpen);
    }

    function togglePill(el) {
      const val = el.dataset.value;
      const cls = val === "Platinado" ? "sel-platinado" : val === "Incompleto" ? "sel-incompleto" : "sel-nunca";
      el.classList.toggle(cls);
    }

    function selectedStatuses() {
      return [...document.querySelectorAll(".status-pill[class*='sel-']")]
        .map(el => el.dataset.value);
    }

    function applyFilters() {
      const statuses = selectedStatuses();
      const hoursMin = parseFloat(document.getElementById("fHoursMin").value);
      const hoursMax = parseFloat(document.getElementById("fHoursMax").value);
      const achMin   = parseInt(document.getElementById("fAchMin").value);
      const achMax   = parseInt(document.getElementById("fAchMax").value);
      const name     = document.getElementById("fName").value.trim().toLowerCase();

      activeFilters = { statuses, hoursMin, hoursMax, achMin, achMax, name };

      const filtered = allGames.filter(g => {
        if (statuses.length && !statuses.includes(g.status)) return false;
        if (!isNaN(hoursMin) && g.hours < hoursMin) return false;
        if (!isNaN(hoursMax) && g.hours > hoursMax) return false;
        if (!isNaN(achMin)   && g.achievements < achMin) return false;
        if (!isNaN(achMax)   && g.achievements > achMax) return false;
        if (name && !g.name.toLowerCase().includes(name)) return false;
        return true;
      });

      renderRows(filtered);
      updateTags();
      document.getElementById("filterPanel").classList.remove("open");
      document.getElementById("filterToggle").classList.remove("active");
    }

    function clearFilters() {
      document.querySelectorAll(".status-pill").forEach(p =>
        p.className = "status-pill"
      );
      ["fHoursMin","fHoursMax","fAchMin","fAchMax","fName"].forEach(id => {
        document.getElementById(id).value = "";
      });
      activeFilters = {};
      renderRows(allGames);
      updateTags();
    }

    function updateTags() {
      const container = document.getElementById("activeTags");
      if (!container) return;
      const tags = [];

      if (activeFilters.statuses?.length)
        tags.push({ label: activeFilters.statuses.join(" · "), key: "status" });
      if (!isNaN(activeFilters.hoursMin) && activeFilters.hoursMin > 0)
        tags.push({ label: `≥ ${activeFilters.hoursMin}h`, key: "hoursMin" });
      if (!isNaN(activeFilters.hoursMax))
        tags.push({ label: `≤ ${activeFilters.hoursMax}h`, key: "hoursMax" });
      if (!isNaN(activeFilters.achMin) && activeFilters.achMin > 0)
        tags.push({ label: `≥ ${activeFilters.achMin} conq.`, key: "achMin" });
      if (!isNaN(activeFilters.achMax))
        tags.push({ label: `≤ ${activeFilters.achMax} conq.`, key: "achMax" });
      if (activeFilters.name)
        tags.push({ label: `"${activeFilters.name}"`, key: "name" });

      const btn = document.getElementById("filterToggle");
      const badge = tags.length ? `<span class="filter-badge">${tags.length}</span>` : "";
      btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 2h13l-5 6v5l-3-1.5V8L1.5 2z"/></svg> Filtros ${badge}`;

      container.innerHTML = tags
        .map(t => `<span class="tag-chip" title="Remover filtro" onclick="removeFilter('${t.key}')"><span>${t.label}</span> ✕</span>`)
        .join("");
    }

    function removeFilter(key) {
      if (key === "status") {
        document.querySelectorAll(".status-pill").forEach(p => p.className = "status-pill");
      } else if (key === "hoursMin") document.getElementById("fHoursMin").value = "";
      else if (key === "hoursMax")   document.getElementById("fHoursMax").value = "";
      else if (key === "achMin")     document.getElementById("fAchMin").value   = "";
      else if (key === "achMax")     document.getElementById("fAchMax").value   = "";
      else if (key === "name")       document.getElementById("fName").value     = "";
      applyFilters();
    }

    function exportXlsx() {
      const profile = profileInput.value.trim();
      if (!profile) return;
      window.open(`/steam/platinum/export?profile=${encodeURIComponent(profile)}`, "_blank");
    }
  </script>
</body>
</html>
