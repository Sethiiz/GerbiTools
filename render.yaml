services:
  - type: web
    name: gerbitools
    runtime: python
    buildCommand: git submodule update --init --recursive && pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: STEAM_API_KEY
        sync: false
    healthCheckPath: /
